name: Build Android APK
on:
  push:
    branches: [ main ]

env:
  APP_VERSION_NAME: "3.3.2"
  APP_VERSION_CODE: "8"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor (preserves checked-in android/ sources)
        run: |
          npx cap copy android
          npx cap sync android

      - name: Set App Version
        run: |
          FILE="android/app/build.gradle"
          sed -i "s/versionName \"[^\"]*\"/versionName \"${APP_VERSION_NAME}\"/" "$FILE"
          sed -i "s/versionCode [0-9][0-9]*/versionCode ${APP_VERSION_CODE}/" "$FILE"
          echo "----- versions in build.gradle -----"
          grep -E "versionName|versionCode" "$FILE"

      - name: Generate App Icons
        run: npx @capacitor/assets generate --android || echo "Icon generation failed"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MedStudy-v${{ env.APP_VERSION_NAME }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
